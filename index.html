<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odoo 19 — Module Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#232836;--accent:#7c5cfc;--accent2:#00d4ff;--accent3:#ff6b35;--gold:#f5c842;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;--radius:12px;--radius-lg:20px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,12,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;gap:12px}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--text);flex-shrink:0}
.nav-brand .grad{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-badge{background:linear-gradient(135deg,#7c5cfc22,#00d4ff11);border:1px solid var(--accent);color:var(--accent2);font-size:.62rem;padding:2px 8px;border-radius:20px;letter-spacing:.08em}
.nav-center{display:flex;gap:4px;flex:1;justify-content:center}
.nav-tab{padding:6px 16px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:.78rem;border:1px solid transparent;transition:all .2s;color:var(--muted);background:transparent}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--accent2);border-color:var(--accent2);background:rgba(0,212,255,.08)}
.lang-switch{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;flex-shrink:0}
.lang-btn{padding:5px 12px;border-radius:7px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;border:none;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.05em}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{background:linear-gradient(135deg,var(--accent),#5b21b6);color:#fff;box-shadow:0 2px 8px rgba(124,92,252,.4)}
.view{display:none;padding-top:80px;min-height:100vh}
.view.active{display:block}
.hero{padding:56px 40px 32px;max-width:1200px;margin:0 auto}
.hero-eyebrow{font-size:.7rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,4vw,3.2rem);line-height:1.1;margin-bottom:14px}
.hero h1 em{font-style:normal;color:var(--accent2)}
.hero-sub{color:var(--muted2);font-size:.85rem;max-width:500px;line-height:1.8;margin-bottom:32px}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 22px;min-width:110px}
.stat-card .num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{font-size:.68rem;color:var(--muted);margin-top:2px}
.search-wrap{position:relative;max-width:440px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px 11px 42px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.95rem}
.cat-wrap{max-width:1200px;margin:0 auto;padding:0 40px 14px}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{padding:5px 13px;border-radius:20px;font-size:.7rem;font-family:'Syne',sans-serif;font-weight:600;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.cat-btn:hover{color:var(--text);border-color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.module-grid{max-width:1200px;margin:0 auto;padding:0 40px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,var(--cc,#7c5cfc)18);opacity:0;transition:opacity .3s}
.module-card:hover{border-color:var(--cc,var(--accent));transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.4)}
.module-card:hover::before{opacity:1}
.mod-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:11px;background:var(--cc,#7c5cfc)22;border:1px solid var(--cc,#7c5cfc)44}
.mod-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;margin-bottom:5px}
.mod-tech{font-size:.65rem;color:var(--muted);margin-bottom:7px}
.mod-desc{font-size:.73rem;color:var(--muted2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mod-badge{display:inline-block;margin-top:10px;font-size:.6rem;padding:3px 8px;border-radius:10px;background:var(--cc,#7c5cfc)22;color:var(--cc,#7c5cfc);border:1px solid var(--cc,#7c5cfc)44;font-family:'Syne',sans-serif;font-weight:600}
#detail-view{max-width:1200px;margin:0 auto;padding:0 40px 60px}
.detail-back{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:.78rem;cursor:pointer;margin-bottom:22px;transition:color .2s}
.detail-back:hover{color:var(--text)}
.detail-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:28px}
.detail-big-icon{width:60px;height:60px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.detail-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:3px}
.detail-tech{font-size:.72rem;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:7px}
.detail-desc{color:var(--muted2);font-size:.83rem;line-height:1.8}
.detail-meta{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.meta-chip{font-size:.68rem;padding:4px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted2)}
.sec-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:26px}
.sec-tab{padding:10px 18px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;font-size:.78rem;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
.sec-tab:hover{color:var(--text)}
.sec-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.models-list{display:flex;flex-direction:column;gap:11px}
.model-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 18px;cursor:pointer;transition:all .2s}
.model-row:hover{border-color:var(--accent);background:var(--surface2)}
.model-row-hd{display:flex;align-items:center;justify-content:space-between}
.model-lbl{font-family:'Syne',sans-serif;font-size:.83rem;font-weight:700;margin-bottom:3px}
.model-tech{font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--accent)}
.model-sdesc{font-size:.72rem;color:var(--muted2)}
.chevron{color:var(--muted);transition:transform .2s;font-size:.85rem}
.model-row.open .chevron{transform:rotate(90deg)}
.fields-panel{margin-top:11px;display:none;background:var(--bg);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.model-row.open .fields-panel{display:block}
.ftable{width:100%;border-collapse:collapse;font-size:.73rem}
.ftable th{background:var(--surface2);color:var(--muted);text-align:left;padding:9px 13px;font-family:'Syne',sans-serif;font-weight:600;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border)}
.ftable td{padding:8px 13px;border-bottom:1px solid var(--border)66;vertical-align:top}
.ftable tr:last-child td{border-bottom:none}
.ftable tr:hover td{background:var(--surface2)}
.ftype{display:inline-block;padding:2px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:500}
.ftype.char    {background:#7c5cfc22;color:#a78bfa;border:1px solid #7c5cfc44}
.ftype.int     {background:#00d4ff22;color:#67e8f9;border:1px solid #00d4ff44}
.ftype.float   {background:#0ea5e922;color:#7dd3fc;border:1px solid #0ea5e944}
.ftype.bool    {background:#22c55e22;color:#86efac;border:1px solid #22c55e44}
.ftype.date    {background:#f5c84222;color:#fde047;border:1px solid #f5c84244}
.ftype.many2one{background:#ff6b3522;color:#fb923c;border:1px solid #ff6b3544}
.ftype.one2many{background:#ec489922;color:#f9a8d4;border:1px solid #ec489944}
.ftype.many2many{background:#8b5cf622;color:#c4b5fd;border:1px solid #8b5cf644}
.ftype.select  {background:#14b8a622;color:#5eead4;border:1px solid #14b8a644}
.ftype.text    {background:#64748b22;color:#94a3b8;border:1px solid #64748b44}
.ftype.binary  {background:#78350f22;color:#fbbf24;border:1px solid #78350f44}
.freq{font-size:.6rem;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.freq.req{background:#ef444422;color:#fca5a5;border-color:#ef444444}
.wf-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px}
.wf-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:22px}
.wf-states{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin-bottom:24px}
.wf-state{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;white-space:nowrap}
.wf-state.start{border-color:var(--green);color:var(--green);background:#22c55e11}
.wf-state.end{border-color:var(--accent3);color:var(--accent3);background:#ff6b3511}
.wf-state.cancel{border-color:var(--red);color:var(--red);background:#ef444411}
.wf-arrow{color:var(--muted);padding:0 7px;flex-shrink:0}
.wf-steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
.wf-step{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.wf-step-n{font-size:.63rem;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.wf-step-t{font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;margin-bottom:4px}
.wf-step-d{font-size:.7rem;color:var(--muted2);line-height:1.6}
.tip-box{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.3);border-radius:var(--radius);padding:14px 18px;font-size:.76rem;color:var(--muted2);line-height:1.7}
.tip-box strong{color:var(--accent2)}
#quiz-view{max-width:740px;margin:0 auto;padding:0 24px 60px}
.quiz-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.quiz-prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 18px;overflow:hidden}
.quiz-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.quiz-ctr{font-size:.73rem;color:var(--muted);white-space:nowrap}
.quiz-score-d{font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;color:var(--gold)}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-cat{font-size:.65rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;font-family:'Syne',sans-serif;font-weight:600}
.q-text{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;line-height:1.5;margin-bottom:24px}
.q-opts{display:flex;flex-direction:column;gap:9px}
.q-opt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;cursor:pointer;font-size:.8rem;line-height:1.5;transition:all .2s;display:flex;align-items:flex-start;gap:11px}
.q-opt:hover:not(.disabled){border-color:var(--accent);background:rgba(124,92,252,.08)}
.q-opt.correct{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.q-opt.disabled{cursor:default}
.opt-ltr{width:23px;height:23px;border-radius:6px;flex-shrink:0;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem}
.q-opt.correct .opt-ltr{background:var(--green);color:#000}
.q-opt.wrong .opt-ltr{background:var(--red);color:#fff}
.q-expl{margin-top:18px;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.76rem;color:var(--muted2);line-height:1.7;display:none}
.q-expl.show{display:block;animation:fadeIn .3s ease}
.q-expl strong{color:var(--accent2)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.q-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.btn{padding:9px 22px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--accent),#5b21b6);color:#fff}
.btn-p:hover{opacity:.85;transform:translateY(-1px)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted2)}
.btn-o:hover{border-color:var(--accent);color:var(--text)}
.quiz-setup-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px;margin-bottom:24px}
.quiz-setup-box h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;margin-bottom:7px}
.quiz-setup-box p{color:var(--muted2);font-size:.78rem;margin-bottom:22px}
.qs-label{font-size:.73rem;color:var(--muted);display:block;margin-bottom:6px}
.qs-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:.8rem;width:100%;outline:none;margin-bottom:14px}
.qs-counts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.cnt-btn{padding:5px 14px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.76rem;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .2s}
.cnt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.quiz-results-box{text-align:center;padding:38px 22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.r-emoji{font-size:3.6rem;margin-bottom:14px}
.r-score{font-family:'Syne',sans-serif;font-weight:800;font-size:2.8rem;margin-bottom:7px;background:linear-gradient(135deg,var(--gold),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-label{color:var(--muted2);font-size:.83rem;margin-bottom:22px}
.r-bar-wrap{background:var(--border);border-radius:4px;height:7px;max-width:280px;margin:0 auto 28px;overflow:hidden}
.r-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.hidden{display:none!important}
.cat-sales{--cc:#00d4ff}.cat-finance{--cc:#22c55e}.cat-inventory{--cc:#ff6b35}.cat-hr{--cc:#f5c842}.cat-project{--cc:#7c5cfc}.cat-website{--cc:#ec4899}.cat-manufacture{--cc:#14b8a6}.cat-technical{--cc:#8b5cf6}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect width="22" height="22" rx="6" fill="url(#ng)"/><defs><linearGradient id="ng" x1="0" y1="0" x2="22" y2="22"><stop stop-color="#7c5cfc"/><stop offset="1" stop-color="#00d4ff"/></linearGradient></defs><text x="11" y="15.5" font-size="11" text-anchor="middle" fill="white" font-weight="900" font-family="sans-serif">O</text></svg>
    <span class="grad">Odoo 19</span>
    <span id="nav-explorer-lbl" style="color:var(--text)">Explorer</span>
    <div class="nav-badge">v19.0</div>
  </div>
  <div class="nav-center">
    <button class="nav-tab active" id="ntab-learn" onclick="showView('learn')">📚 <span id="nl-txt">Learn</span></button>
    <button class="nav-tab" id="ntab-quiz" onclick="showView('quiz')">🧠 <span id="nq-txt">Quiz</span></button>
  </div>
  <div class="lang-switch">
    <button class="lang-btn active" id="lb-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lb-fr" onclick="setLang('fr')">FR</button>
  </div>
</nav>

<!-- LEARN VIEW -->
<div class="view active" id="learn-view">
  <div id="list-screen">
    <div class="hero">
      <div class="hero-eyebrow" id="h-eyebrow"></div>
      <h1 id="h-h1"><em id="h-em"></em></h1>
      <p class="hero-sub" id="h-sub"></p>
      <div class="hero-stats">
        <div class="stat-card"><div class="num">18</div><div class="lbl" id="st-mod"></div></div>
        <div class="stat-card"><div class="num">80+</div><div class="lbl" id="st-mdl"></div></div>
        <div class="stat-card"><div class="num">500+</div><div class="lbl" id="st-fld"></div></div>
        <div class="stat-card"><div class="num">50+</div><div class="lbl" id="st-q"></div></div>
      </div>
      <div class="search-wrap"><span class="search-ico">⌕</span><input type="text" id="srch" oninput="filterMods()" id="srch-inp"></div>
    </div>
    <div class="cat-wrap"><div class="cat-filters" id="cat-filters"></div></div>
    <div class="module-grid" id="mod-grid"></div>
  </div>

  <div id="detail-screen" class="hidden">
    <div id="detail-view">
      <div class="detail-back" onclick="backToList()">← <span id="back-lbl"></span></div>
      <div class="detail-header">
        <div class="detail-big-icon" id="d-icon"></div>
        <div>
          <div class="detail-title" id="d-title"></div>
          <div class="detail-tech" id="d-tech"></div>
          <div class="detail-desc" id="d-desc"></div>
          <div class="detail-meta" id="d-meta"></div>
        </div>
      </div>
      <div class="sec-tabs">
        <div class="sec-tab active" id="stab-models" onclick="showSec('models',this)">🧩 <span id="tab-m-txt"></span></div>
        <div class="sec-tab" id="stab-wf" onclick="showSec('workflow',this)">🔄 <span id="tab-w-txt"></span></div>
        <div class="sec-tab" id="stab-tips" onclick="showSec('tips',this)">💡 <span id="tab-t-txt"></span></div>
      </div>
      <div id="sec-models" class="models-list"></div>
      <div id="sec-workflow" class="hidden wf-wrap"></div>
      <div id="sec-tips" class="hidden"></div>
    </div>
  </div>
</div>

<!-- QUIZ VIEW -->
<div class="view" id="quiz-view-wrap">
  <div id="quiz-view">
    <div id="quiz-setup">
      <div class="quiz-setup-box">
        <h2 id="qz-title">🧠 Certification Quiz</h2>
        <p id="qz-sub"></p>
        <label class="qs-label" id="qz-lbl-mod"></label>
        <select id="qz-mod-sel" class="qs-select"></select>
        <label class="qs-label" id="qz-lbl-cnt"></label>
        <div class="qs-counts">

let lang='en', curMod=null, activeCat='all', qList=[], qIdx=0, qScore=0, qTotal=10, answered=false, selCnt=10;

/* ─────────────────────────────────────────
   LANG SWITCH
───────────────────────────────────────── */
function setLang(l){
  lang=l;
  document.getElementById('lb-en').classList.toggle('active',l==='en');
  document.getElementById('lb-fr').classList.toggle('active',l==='fr');
  document.documentElement.lang=l;
  applyUI();
  renderGrid(filtered());
  if(curMod) openMod(curMod.id);
}

function tx(k){return T[lang][k]||T.en[k];}

function applyUI(){
  const L=T[lang];
  document.getElementById('nav-explorer-lbl').textContent=L.explorer;
  document.getElementById('nl-txt').textContent=L.navLearn;
  document.getElementById('nq-txt').textContent=L.navQuiz;
  document.getElementById('h-eyebrow').textContent=L.eyebrow;
  const h1=document.getElementById('h-h1');
  h1.childNodes[0].textContent=L.h1pre;
  document.getElementById('h-em').textContent=L.h1em;
  document.getElementById('h-sub').textContent=L.sub;
  document.getElementById('st-mod').textContent=L.stMod;
  document.getElementById('st-mdl').textContent=L.stMdl;
  document.getElementById('st-fld').textContent=L.stFld;
  document.getElementById('st-q').textContent=L.stQ;
  document.getElementById('srch').placeholder=L.searchPh;
  // cat buttons
  const cats=document.querySelectorAll('.cat-btn');
  const catKeys=['catAll','sales','finance','inventory','hr','project','website','manufacture','technical'];
  L.cats.forEach((c,i)=>{if(cats[i])cats[i].textContent=c;});
  document.getElementById('back-lbl').textContent=L.backLbl;
  document.getElementById('tab-m-txt').textContent=L.tabM;
  document.getElementById('tab-w-txt').textContent=L.tabW;
  document.getElementById('tab-t-txt').textContent=L.tabT;
  document.getElementById('qz-title').textContent='🧠 '+L.qzTitle;
  document.getElementById('qz-sub').textContent=L.qzSub;
  document.getElementById('qz-lbl-mod').textContent=L.qzLblMod;
  document.getElementById('qz-lbl-cnt').textContent=L.qzLblCnt;
  document.getElementById('cnt-all-btn').textContent=L.cntAll;
  document.getElementById('btn-start').textContent=L.btnStart;
  document.getElementById('btn-skip').textContent=L.btnSkip;
  document.getElementById('btn-next').textContent=L.btnNext;
  document.getElementById('btn-retry').textContent=L.btnRetry;
  document.getElementById('btn-bklearn').textContent=L.btnBack;
  buildQuizSelect();
}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
function showView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  if(v==='learn'){
    document.getElementById('learn-view').classList.add('active');
    document.getElementById('ntab-learn').classList.add('active');
  } else {
    document.getElementById('quiz-view-wrap').classList.add('active');
    document.getElementById('ntab-quiz').classList.add('active');
    buildQuizSelect();
  }
}

/* ─────────────────────────────────────────
   MODULE GRID
───────────────────────────────────────── */
function md(m){return m[lang]||m.en;}
function filtered(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase();
  return MODS.filter(m=>{
    const d=md(m);
    return (activeCat==='all'||m.cat===activeCat)&&(!q||d.name.toLowerCase().includes(q)||d.tn.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q));
  });
}
function filterMods(){renderGrid(filtered());}
function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(filtered());
}

const catColors={sales:'#00d4ff',finance:'#22c55e',inventory:'#ff6b35',hr:'#f5c842',project:'#7c5cfc',website:'#ec4899',manufacture:'#14b8a6',technical:'#8b5cf6'};

function renderGrid(mods){
  const g=document.getElementById('mod-grid');
  g.innerHTML='';
  if(!mods.length){g.innerHTML='<div style="padding:40px;color:var(--muted);grid-column:1/-1;text-align:center;font-size:.82rem;">No modules found.</div>';return;}
  mods.forEach(m=>{
    const d=md(m), cc=catColors[m.cat]||'#7c5cfc';
    const card=document.createElement('div');
    card.className=`module-card cat-${m.cat}`;
    card.style.setProperty('--cc',cc);
    card.onclick=()=>openMod(m.id);
    card.innerHTML=`<div class="mod-icon">${m.icon}</div><div class="mod-name">${d.name}</div><div class="mod-tech">${d.tn}</div><div class="mod-desc">${d.desc}</div><span class="mod-badge">${m.cat}</span>`;
    g.appendChild(card);
  });
}

/* ─────────────────────────────────────────
   DETAIL
───────────────────────────────────────── */
function openMod(id){
  curMod=MODS.find(m=>m.id===id);if(!curMod)return;
  const d=md(curMod), cc=catColors[curMod.cat]||'#7c5cfc';
  document.getElementById('list-screen').classList.add('hidden');
  document.getElementById('detail-screen').classList.remove('hidden');
  window.scrollTo(0,0);
  const dv=document.getElementById('detail-view');
  dv.style.setProperty('--cc',cc);
  document.getElementById('d-icon').textContent=curMod.icon;
  document.getElementById('d-icon').style.cssText=`background:${cc}22;border:1px solid ${cc}44`;
  document.getElementById('d-title').textContent=d.name;
  document.getElementById('d-tech').textContent='// '+d.tn;
  document.getElementById('d-desc').textContent=d.desc;
  const meta=document.getElementById('d-meta');
  meta.innerHTML='';
  (curMod.en.models||[]).forEach(m=>{const c=document.createElement('span');c.className='meta-chip';c.textContent=m.tech;meta.appendChild(c);});
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-models').classList.add('active');
  showSec('models',null);
}

function backToList(){
  document.getElementById('list-screen').classList.remove('hidden');
  document.getElementById('detail-screen').classList.add('hidden');
}

function showSec(sec, btn){
  if(btn){document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');}
  document.getElementById('sec-models').className='models-list hidden';
  document.getElementById('sec-workflow').className='hidden wf-wrap';
  document.getElementById('sec-tips').className='hidden';
  const d=md(curMod);
  if(sec==='models'){
    const el=document.getElementById('sec-models');
    el.classList.remove('hidden');
    renderModels(el,d.models);
  } else if(sec==='workflow'){
    const el=document.getElementById('sec-workflow');
    el.classList.remove('hidden');
    renderWF(el,d.wf);
  } else {
    const el=document.getElementById('sec-tips');
    el.classList.remove('hidden');
    renderTips(el,d.tips,d.name);
  }
}

function renderModels(el,models){
  el.innerHTML='';
  models.forEach(m=>{
    const row=document.createElement('div');
    row.className='model-row';
    row.innerHTML=`<div class="model-row-hd" onclick="toggleRow(this.parentElement)">
      <div><div class="model-lbl">${m.name}</div><div class="model-tech">${m.tech}</div><div class="model-sdesc">${m.desc}</div></div>
      <span class="chevron">▶</span>
    </div>
    <div class="fields-panel">
      <table class="ftable">
        <thead><tr><th>${tx('fName')}</th><th>${tx('fType')}</th><th>${tx('fReq')}</th><th>${tx('fDesc')}</th></tr></thead>
        <tbody>${m.fields.map(f=>`<tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--accent2)">${f.n}</td>
          <td><span class="ftype ${f.t}">${f.t}</span></td>
          <td><span class="freq ${f.r?'req':''}">${f.r?tx('req'):tx('opt')}</span></td>
          <td style="color:var(--muted2)">${f.d}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
    el.appendChild(row);
  });
}

function toggleRow(row){row.classList.toggle('open');}

function renderWF(el,wf){
  const st=wf.st||[];
  el.innerHTML=`<div class="wf-title">🔄 ${wf.title}</div>
    <div class="wf-states">${wf.states.map((s,i)=>s==='→'||s==='/'?`<div class="wf-arrow">${s}</div>`:`<div class="wf-state ${st[i]||''}">${s}</div>`).join('')}</div>
    <div class="wf-steps">${wf.steps.map(s=>`<div class="wf-step"><div class="wf-step-n">${tx('step')} ${s.n}</div><div class="wf-step-t">${s.t}</div><div class="wf-step-d">${s.d}</div></div>`).join('')}</div>`;
}

function renderTips(el,tips,name){
  if(!tips||!tips.length){el.innerHTML='<div style="color:var(--muted);font-size:.8rem;">—</div>';return;}
  el.innerHTML=`<div class="tip-box"><strong style="display:block;margin-bottom:12px;font-family:'Syne',sans-serif;font-size:.88rem;">💡 ${tx('tipsFor')} ${name}</strong>${tips.map(t=>`<div style="margin-bottom:10px;padding-left:8px;border-left:2px solid var(--accent)">${t}</div>`).join('')}</div>`;
}

/* ─────────────────────────────────────────
   QUIZ
───────────────────────────────────────── */
function buildQuizSelect(){
  const sel=document.getElementById('qz-mod-sel');
  sel.innerHTML=`<option value="all">${tx('qzAll')}</option>`;
  [...new Set(QS.map(q=>q.mod))].forEach(mid=>{
    const m=MODS.find(x=>x.id===mid);
    if(m){const o=document.createElement('option');o.value=mid;o.textContent=md(m).name;sel.appendChild(o);}
  });
}

function setCnt(n,btn){
  selCnt=n;
  document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function startQuiz(){
  const mod=document.getElementById('qz-mod-sel').value;
  let pool=mod==='all'?[...QS]:QS.filter(q=>q.mod===mod);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  qList=pool.slice(0,Math.min(selCnt===999?9999:selCnt,pool.length));
  qIdx=0;qScore=0;answered=false;
  document.getElementById('quiz-setup').classList.add('hidden');
  document.getElementById('quiz-results').classList.add('hidden');
  document.getElementById('quiz-active').classList.remove('hidden');
  renderQ();
}

function renderQ(){
  if(qIdx>=qList.length){showResults();return;}
  const q=qList[qIdx], qd=q[lang]||q.en;
  answered=false;
  document.getElementById('q-cat').textContent=qd.cat;
  document.getElementById('q-text').textContent=qd.q;
  document.getElementById('q-expl').innerHTML=qd.expl;
  document.getElementById('q-expl').classList.remove('show');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-next').textContent=tx('btnNext');
  document.getElementById('btn-skip').textContent=tx('btnSkip');
  document.getElementById('qz-ctr').textContent=`${qIdx+1} / ${qList.length}`;
  document.getElementById('qz-score').textContent=`⭐ ${qScore}`;
  document.getElementById('qz-prog').style.width=(qIdx/qList.length*100)+'%';
  const opts=document.getElementById('q-opts');
  opts.innerHTML='';
  const ltrs=['A','B','C','D'];
  qd.opts.forEach((o,i)=>{
    const el=document.createElement('div');
    el.className='q-opt';
    el.innerHTML=`<span class="opt-ltr">${ltrs[i]}</span><span>${o}</span>`;
    el.onclick=()=>pick(i,qd.a);
    opts.appendChild(el);
  });
  const card=document.getElementById('qz-card');
  card.style.animation='none';
  requestAnimationFrame(()=>{card.style.animation='slideIn .3s ease';});
}

function pick(chosen,correct){
  if(answered)return;answered=true;
  const opts=document.querySelectorAll('.q-opt');
  opts.forEach(o=>o.classList.add('disabled'));
  if(chosen===correct){opts[chosen].classList.add('correct');qScore++;}
  else{opts[chosen].classList.add('wrong');opts[correct].classList.add('correct');}
  document.getElementById('q-expl').classList.add('show');
  document.getElementById('btn-next').classList.remove('hidden');
}

function nextQ(){qIdx++;renderQ();}
function skipQ(){if(!answered){qIdx++;renderQ();}}

function showResults(){
  document.getElementById('quiz-active').classList.add('hidden');
  document.getElementById('quiz-results').classList.remove('hidden');
  const pct=Math.round(qScore/qList.length*100);
  const rl=T[lang].res;
  let emoji='😟',label=rl[0];
  if(pct>=90){emoji='🏆';label=rl[90];}
  else if(pct>=75){emoji='🎉';label=rl[75];}
  else if(pct>=60){emoji='💪';label=rl[60];}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-score').textContent=`${qScore} / ${qList.length}`;
  document.getElementById('r-label').textContent=label+` (${pct}%)`;
  document.getElementById('btn-retry').textContent=tx('btnRetry');
  document.getElementById('btn-bklearn').textContent=tx('btnBack');
  setTimeout(()=>{document.getElementById('r-bar').style.width=pct+'%';},200);
}

function resetQuiz(){
  document.getElementById('quiz-results').classList.add('hidden');
  document.getElementById('quiz-active').classList.add('hidden');
  document.getElementById('quiz-setup').classList.remove('hidden');
}

/* ─────────────────────────────────────────
   BUILD CATEGORY BUTTONS
───────────────────────────────────────── */
(function buildCats(){
  const cf=document.getElementById('cat-filters');
  cf.innerHTML='';
  const cats=[['all',null],['sales','sales'],['finance','finance'],['inventory','inventory'],['hr','hr'],['project','project'],['website','website'],['manufacture','manufacture'],['technical','technical']];
  cats.forEach(([key,cat])=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(key==='all'?' active':'');
    btn.setAttribute('data-cat',key);
    btn.onclick=()=>filterCat(cat||'all',btn);
    cf.appendChild(btn);
  });
})();

/* BUILD h1 structure */
(function buildH1(){
  const h1=document.getElementById('h-h1');
  h1.innerHTML='';
  const txt=document.createTextNode('');
  h1.appendChild(txt);
  const em=document.createElement('em');
  em.id='h-em';
  h1.appendChild(em);
})();

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
applyUI();
renderGrid(MODS);
</script>
