<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odoo 19 — Découvrez vos modules</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f5;--surface:#ffffff;--surface2:#f3f0eb;--border:#e8e2d9;
  --text:#1a1814;--muted:#7a7268;--muted2:#a89e92;
  --accent:#2d5a3d;--accent2:#c8873a;--accent3:#1e3a5f;
  --radius:14px;--radius-lg:22px;--radius-xl:32px;
  --shadow:0 2px 20px rgba(0,0,0,.07);--shadow-lg:0 8px 48px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── DECORATIVE BG ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 10% 10%, rgba(45,90,61,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 80%, rgba(200,135,58,.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(30,58,95,.04) 0%, transparent 60%);
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(250,248,245,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:64px;
}
.nav-logo{display:flex;align-items:center;gap:12px}
.nav-logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#4a8c5c);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:1rem;
  color:#fff;letter-spacing:-.02em;
}
.nav-logo-text{font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;color:var(--text);letter-spacing:-.01em}
.nav-logo-version{font-size:.68rem;color:var(--muted2);font-weight:300;margin-left:2px}
.lang-switch{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:0}
.lang-btn{padding:5px 14px;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.75rem;border:none;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.02em}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(45,90,61,.3)}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  padding:120px 48px 72px;
  max-width:1100px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:80px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(45,90,61,.1);border:1px solid rgba(45,90,61,.2);
  color:var(--accent);border-radius:20px;padding:6px 14px;
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:24px;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:clamp(2.2rem,4vw,3.4rem);line-height:1.12;
  letter-spacing:-.02em;margin-bottom:20px;color:var(--text);
}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:1rem;color:var(--muted);line-height:1.8;font-weight:300;margin-bottom:36px;max-width:480px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.hstat{border-left:2px solid var(--border);padding-left:16px}
.hstat .num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--text);line-height:1}
.hstat .lbl{font-size:.72rem;color:var(--muted);margin-top:3px;font-weight:400}
.hero-visual{
  position:relative;display:flex;align-items:center;justify-content:center;
}
.hero-card-stack{position:relative;width:320px;height:280px}
.hcard{
  position:absolute;background:var(--surface);border-radius:var(--radius-lg);
  padding:24px;box-shadow:var(--shadow-lg);border:1px solid var(--border);
  transition:all .4s ease;
}
.hcard:nth-child(1){top:0;left:0;right:0;z-index:3;transform:rotate(-1deg)}
.hcard:nth-child(2){top:20px;left:16px;right:-16px;z-index:2;transform:rotate(2deg);opacity:.7}
.hcard:nth-child(3){top:40px;left:-8px;right:8px;z-index:1;transform:rotate(-1.5deg);opacity:.4}
.hcard-icon{font-size:1.8rem;margin-bottom:12px}
.hcard-title{font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;margin-bottom:6px}
.hcard-desc{font-size:.76rem;color:var(--muted);line-height:1.6}
.hcard-tag{display:inline-block;margin-top:12px;font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:8px;background:var(--surface2);color:var(--muted)}

/* ── SEARCH + FILTERS ── */
.discovery-bar{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;padding:0 48px 32px;
}
.search-wrap{position:relative;max-width:460px;margin-bottom:20px}
.search-wrap input{
  width:100%;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:13px 16px 13px 48px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;
  outline:none;transition:all .2s;box-shadow:var(--shadow);
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,90,61,.1)}
.search-wrap input::placeholder{color:var(--muted2)}
.search-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:.95rem}
.cat-strip{display:flex;gap:8px;flex-wrap:wrap}
.cat-pill{
  padding:7px 16px;border-radius:20px;font-size:.75rem;font-weight:500;
  border:1.5px solid var(--border);cursor:pointer;background:var(--surface);
  color:var(--muted);transition:all .2s;box-shadow:var(--shadow);
}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(45,90,61,.25)}

/* ── MODULE GRID ── */
.mod-grid{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;padding:0 48px 80px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;
}
.mod-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);padding:28px;
  cursor:pointer;transition:all .3s;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.mod-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--cc,var(--accent));transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.mod-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--cc,var(--accent))}
.mod-card:hover::after{transform:scaleX(1)}
.mc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.mc-icon{
  width:48px;height:48px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  background:var(--cc,var(--accent))14;
  border:1px solid var(--cc,var(--accent))28;
}
.mc-cat-tag{
  font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 10px;border-radius:8px;
  background:var(--cc,var(--accent))14;
  color:var(--cc,var(--accent));
  border:1px solid var(--cc,var(--accent))28;
}
.mc-name{font-family:'Playfair Display',serif;font-weight:600;font-size:1.1rem;margin-bottom:8px;color:var(--text)}
.mc-desc{font-size:.8rem;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.mc-footer{margin-top:18px;display:flex;align-items:center;justify-content:space-between}
.mc-features{display:flex;gap:6px;flex-wrap:wrap}
.mc-feat{font-size:.62rem;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);font-weight:500}
.mc-arrow{color:var(--cc,var(--accent));font-size:1rem;transition:transform .2s}
.mod-card:hover .mc-arrow{transform:translateX(4px)}

/* ── DETAIL OVERLAY ── */
#overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(26,24,20,.5);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#overlay.open{opacity:1;pointer-events:all}
#detail-panel{
  position:fixed;top:0;right:0;bottom:0;z-index:201;
  width:min(680px,100vw);
  background:var(--bg);overflow-y:auto;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  border-left:1px solid var(--border);
  box-shadow:-20px 0 60px rgba(0,0,0,.12);
}
#detail-panel.open{transform:translateX(0)}
.dp-inner{padding:48px 44px 60px}
.dp-close{
  display:flex;align-items:center;gap:8px;margin-bottom:32px;
  color:var(--muted);cursor:pointer;font-size:.82rem;font-weight:500;
  transition:color .2s;width:fit-content;
}
.dp-close:hover{color:var(--text)}
.dp-hero{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px}
.dp-icon{
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;flex-shrink:0;
  background:var(--cc,var(--accent))14;
  border:1px solid var(--cc,var(--accent))28;
}
.dp-name{font-family:'Playfair Display',serif;font-weight:700;font-size:1.8rem;color:var(--text);margin-bottom:6px;line-height:1.1}
.dp-cat{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cc,var(--accent));margin-bottom:10px}
.dp-desc{font-size:.9rem;color:var(--muted);line-height:1.8;font-weight:300}

/* BENEFITS */
.dp-section{margin-bottom:36px}
.dp-section-title{
  font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.dp-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.benefits-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.benefit-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;
}
.benefit-icon{font-size:1.2rem;margin-bottom:8px}
.benefit-title{font-weight:600;font-size:.82rem;margin-bottom:4px;color:var(--text)}
.benefit-desc{font-size:.76rem;color:var(--muted);line-height:1.6}

/* WORKFLOW */
.wf-timeline{display:flex;flex-direction:column;gap:0}
.wf-step{display:flex;gap:16px;position:relative}
.wf-step:not(:last-child) .wf-line{position:absolute;left:19px;top:38px;bottom:0;width:2px;background:linear-gradient(to bottom,var(--cc,var(--accent))40,transparent)}
.wf-num{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--cc,var(--accent))14;border:2px solid var(--cc,var(--accent))40;
  font-family:'Playfair Display',serif;font-weight:700;font-size:.82rem;
  color:var(--cc,var(--accent));position:relative;z-index:1;
}
.wf-content{padding:6px 0 28px}
.wf-step-title{font-weight:600;font-size:.88rem;color:var(--text);margin-bottom:4px}
.wf-step-desc{font-size:.78rem;color:var(--muted);line-height:1.7}

/* STATES */
.states-flow{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin-bottom:24px}
.state-bubble{
  padding:8px 16px;border-radius:20px;font-size:.76rem;font-weight:600;
  background:var(--surface);border:1.5px solid var(--border);color:var(--muted);white-space:nowrap;
}
.state-bubble.start{border-color:var(--accent);color:var(--accent);background:rgba(45,90,61,.08)}
.state-bubble.end{border-color:var(--accent2);color:var(--accent2);background:rgba(200,135,58,.08)}
.state-bubble.cancel{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,.06)}
.state-arrow{color:var(--muted2);padding:0 8px;font-size:.9rem}

/* TIPS */
.tips-list{display:flex;flex-direction:column;gap:12px}
.tip-item{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;
}
.tip-ico{font-size:1rem;flex-shrink:0;margin-top:1px}
.tip-text{font-size:.8rem;color:var(--muted);line-height:1.7}

/* SECTION TABS */
.dtabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0}
.dtab{
  padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:500;font-size:.8rem;color:var(--muted);
  border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;
}
.dtab:hover{color:var(--text)}
.dtab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── FOOTER ── */
footer{
  position:relative;z-index:1;
  background:var(--surface);border-top:1px solid var(--border);
  padding:32px 48px;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-logo{font-family:'Playfair Display',serif;font-weight:600;font-size:.95rem;color:var(--text)}
.footer-note{font-size:.75rem;color:var(--muted2)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hidden{display:none!important}

/* category colors */
.cc-sales   {--cc:#1e3a5f}
.cc-finance {--cc:#2d5a3d}
.cc-invt    {--cc:#c8873a}
.cc-hr      {--cc:#7b4f8e}
.cc-proj    {--cc:#2a6b8a}
.cc-web     {--cc:#c0392b}
.cc-mfg     {--cc:#5a7a3a}
.cc-tech    {--cc:#6b5a3a}
</style>
</head>

<nav>

    <div class="nav-logo-mark">O</div>
    <span class="nav-logo-text">Odoo <span class="nav-logo-version">19</span></span>
  </div>
  <div class="lang-switch">
    <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn active" id="lb-fr" onclick="setLang('fr')">FR</button>
  </div>

<!-- HERO -->

    </div>

  <div class="hero-visual">
    <div class="hero-card-stack">
      <div class="hcard"><div class="hcard-icon">📊</div><div class="hcard-title" id="hc1-title"></div><div class="hcard-desc" id="hc1-desc"></div><span class="hcard-tag" id="hc1-tag"></span></div>
      <div class="hcard"><div class="hcard-icon">🛒</div><div class="hcard-title" id="hc2-title"></div><div class="hcard-desc" id="hc2-desc"></div><span class="hcard-tag" id="hc2-tag"></span></div>
      <div class="hcard"><div class="hcard-icon">📦</div><div class="hcard-title" id="hc3-title"></div></div>

<!-- SEARCH + FILTERS -->
<div class="discovery-bar">
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input type="text" id="srch" oninput="filterMods()">
  </div>
  <div class="cat-strip" id="cat-strip"></div>
</div>

<!-- GRID -->
<div class="mod-grid" id="mod-grid"></div>

<!-- DETAIL OVERLAY -->
<div id="overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-inner">
    <div class="dp-close" onclick="closeDetail()">← <span id="dp-back-lbl"></span></div>
    <div class="dp-hero">
      <div class="dp-icon" id="dp-icon"></div>
      <div>
        <div class="dp-cat" id="dp-cat"></div>
        <div class="dp-name" id="dp-name"></div>
        <div class="dp-desc" id="dp-desc"></div>
      </div>
    </div>
    <div class="dtabs">
      <div class="dtab active" id="dta" onclick="showDTab('benefits',this)"><span id="tab-b-lbl"></span></div>
      <div class="dtab" id="dtb" onclick="showDTab('workflow',this)"><span id="tab-w-lbl"></span></div>
      <div class="dtab" id="dtc" onclick="showDTab('tips',this)"><span id="tab-t-lbl"></span></div>
    </div>
    <div id="dp-benefits"></div>
    <div id="dp-workflow" class="hidden"></div>
    <div id="dp-tips" class="hidden"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">Odoo 19</div>
  <div class="footer-note" id="footer-note"></div>
</footer>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let lang='fr', activeCat='all', curMod=null, curTab='benefits';

/* ══════════════════════════════════════════
   LANG
══════════════════════════════════════════ */
function setLang(l){
  lang=l;
  document.getElementById('lb-en').classList.toggle('active',l==='en');
  document.getElementById('lb-fr').classList.toggle('active',l==='fr');
  document.documentElement.lang=l;
  applyUI();
  renderGrid(filtered());
  if(curMod) openMod(curMod.id);
}

function tx(k){return T[lang][k]||T.fr[k];}
function md(m){return m[lang]||m.fr;}

function applyUI(){
  const L=T[lang];
  document.getElementById('h-badge').textContent=L.badge;
  document.getElementById('h-title').innerHTML=L.title.replace('\n','<br>');
  document.getElementById('h-sub').textContent=L.sub;
  document.getElementById('hs1').textContent=L.hs1;
  document.getElementById('hs2').textContent=L.hs2;
  document.getElementById('hs3').textContent=L.hs3;
  document.getElementById('hc1-title').textContent=L.hc1t;
  document.getElementById('hc1-desc').textContent=L.hc1d;
  document.getElementById('hc1-tag').textContent=L.hc1tag;
  document.getElementById('hc2-title').textContent=L.hc2t;
  document.getElementById('hc2-desc').textContent=L.hc2d;
  document.getElementById('hc2-tag').textContent=L.hc2tag;
  document.getElementById('hc3-title').textContent=L.hc3t;
  document.getElementById('srch').placeholder=L.searchPh;
  document.getElementById('dp-back-lbl').textContent=L.backLbl;
  document.getElementById('tab-b-lbl').textContent=L.tabB;
  document.getElementById('tab-w-lbl').textContent=L.tabW;
  document.getElementById('tab-t-lbl').textContent=L.tabT;
  document.getElementById('footer-note').textContent=L.footer;
  buildCatStrip();
}

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
function filtered(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase();
  return MODS.filter(m=>{
    const d=md(m);
    return (activeCat==='all'||m.cat===activeCat)&&
           (!q||d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.catLabel.toLowerCase().includes(q));
  });
}

function filterMods(){renderGrid(filtered());}

const catMap=[
  ['all',null],['sales','sales'],['finance','finance'],['invt','invt'],
  ['hr','hr'],['proj','proj'],['web','web'],['mfg','mfg'],['tech','tech']
];

function buildCatStrip(){
  const strip=document.getElementById('cat-strip');
  strip.innerHTML='';
  const L=T[lang];
  catMap.forEach(([key,cat],i)=>{
    const btn=document.createElement('button');
    btn.className='cat-pill'+(key==='all'?' active':'');
    btn.textContent=L.cats[i];
    btn.onclick=()=>{
      activeCat=cat||'all';
      document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(filtered());
    };
    strip.appendChild(btn);
  });
}

function renderGrid(mods){
  const g=document.getElementById('mod-grid');
  g.innerHTML='';
  if(!mods.length){
    g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted2);font-size:.88rem;">${lang==='fr'?'Aucun module trouvé.':'No module found.'}</div>`;
    return;
  }
  mods.forEach(m=>{
    const d=md(m);
    const card=document.createElement('div');
    card.className='mod-card';
    card.style.setProperty('--cc',m.cc);
    card.onclick=()=>openMod(m.id);
    card.innerHTML=`
      <div class="mc-header">
        <div class="mc-icon">${m.icon}</div>
        <span class="mc-cat-tag">${d.catLabel}</span>
      </div>
      <div class="mc-name">${d.name}</div>
      <div class="mc-desc">${d.desc}</div>
      <div class="mc-footer">
        <div class="mc-features">${d.benefits.slice(0,3).map(b=>`<span class="mc-feat">${b.t}</span>`).join('')}</div>
        <span class="mc-arrow">→</span>
      </div>
    `;
    g.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   DETAIL
══════════════════════════════════════════ */
function openMod(id){
  curMod=MODS.find(m=>m.id===id);if(!curMod)return;
  const d=md(curMod);
  document.getElementById('dp-icon').textContent=curMod.icon;
  document.getElementById('dp-icon').style.cssText=`background:${curMod.cc}14;border:1px solid ${curMod.cc}28`;
  document.getElementById('dp-cat').textContent=d.catLabel;
  document.getElementById('dp-cat').style.color=curMod.cc;
  document.getElementById('dp-name').textContent=d.name;
  document.getElementById('dp-desc').textContent=d.desc;
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('dta').classList.add('active');
  curTab='benefits';
  renderDTab('benefits',d);
  document.getElementById('dp-benefits').classList.remove('hidden');
  document.getElementById('dp-workflow').classList.add('hidden');
  document.getElementById('dp-tips').classList.add('hidden');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  document.body.style.overflow='';
}

function showDTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['dp-benefits','dp-workflow','dp-tips'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  const d=md(curMod);
  if(tab==='benefits'){document.getElementById('dp-benefits').classList.remove('hidden');renderDTab('benefits',d);}
  else if(tab==='workflow'){document.getElementById('dp-workflow').classList.remove('hidden');renderDTab('workflow',d);}
  else{document.getElementById('dp-tips').classList.remove('hidden');renderDTab('tips',d);}
}

function renderDTab(tab,d){
  const cc=curMod.cc;
  if(tab==='benefits'){
    const el=document.getElementById('dp-benefits');
    el.innerHTML=`<div class="dp-section">
      <div class="dp-section-title">${tx('secB')}</div>
      <div class="benefits-grid">${d.benefits.map(b=>`
        <div class="benefit-card">
          <div class="benefit-icon">${b.ico}</div>
          <div class="benefit-title">${b.t}</div>
          <div class="benefit-desc">${b.d}</div>
        </div>`).join('')}
      </div>
    </div>`;
  } else if(tab==='workflow'){
    const el=document.getElementById('dp-workflow');
    el.innerHTML=`<div class="dp-section">
      <div class="dp-section-title">${tx('secW')}</div>
      <div class="states-flow">${d.states.map((s,i)=>{
        if(s==='→'||s==='/') return `<span class="state-arrow">${s}</span>`;
        const cls=(d.st||[])[i]||'';
        return `<span class="state-bubble ${cls}">${s}</span>`;
      }).join('')}</div>
      <div class="wf-timeline">${d.steps.map((s,i)=>`
        <div class="wf-step">
          <div class="wf-line"></div>
          <div class="wf-num" style="border-color:${cc}60;color:${cc};background:${cc}12">${s.n}</div>
          <div class="wf-content">
            <div class="wf-step-title">${s.t}</div>
            <div class="wf-step-desc">${s.d}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  } else {
    const el=document.getElementById('dp-tips');
    el.innerHTML=`<div class="dp-section">
      <div class="dp-section-title">${tx('secT')}</div>
      <div class="tips-list">${d.tips.map(tip=>`
        <div class="tip-item">
          <span class="tip-ico">💡</span>
          <span class="tip-text">${tip}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }
}
